<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรเจกต์นี้เพื่ออาจารย์</title>
    <style>
        body {
            background-color: #1e1e2e;
            color: #cdd6f4;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background: #313244;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 4px solid #f9e2af;
        }
        h1 { color: #f9e2af; }
        .emoji { font-size: 80px; margin: 20px 0; }
        button {
            background: #a6e3a1;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.1); background: #94e2d5; }
    </style>
</head>
<body>

    <div class="card">
        <h1>กราบเรียนอาจารย์ที่เคารพ 🙏</h1>
        <h1>ผมศิวดล วะเศษสร้อย 664110310052 cpe ปี 4</h1>
        <div class="emoji">👨‍💻</div>
        <p>สนใจ กาแฟหอมๆ</p>
        <button onclick="alert('อาจารย์ครับ... ใจเย็นๆ ค่อยๆ ให้เกรด A นะครับ!')">กดเพื่อรับเกรด A</button>
    </div>

</body>
</html>
